<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juego Programación PRO</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:linear-gradient(#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
}

.contenedor{
margin:20px auto;
padding:20px;
width:90%;
max-width:700px;
background:rgba(0,0,0,0.6);
border-radius:15px;
}

button{
padding:12px;
margin:8px;
border:none;
border-radius:10px;
background:#00c6ff;
color:white;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#0072ff;
transform:scale(1.05);
}

input{
padding:10px;
margin:10px;
border-radius:10px;
border:none;
width:70%;
}

.oculto{
display:none;
}

/* BARRA VIDA */
#vidaBar{
width:90%;
height:20px;
background:#333;
border-radius:20px;
margin:auto;
overflow:hidden;
}

#vida{
height:100%;
width:100%;
background:linear-gradient(90deg,lime,green);
transition:.5s;
}

/* PANTALLA FINAL */
#pantallaFinal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
font-size:30px;
z-index:999;
}
</style>
</head>

<body>

<h1>🎮 Aprende Programación PRO</h1>

<!-- LOGIN -->
<div id="login" class="contenedor">
<input id="nombre" placeholder="Nombre"><br>
<input id="correo" placeholder="Correo"><br>
<button onclick="registrar()">Entrar</button>
</div>

<!-- ESPECIALIDAD -->
<div id="especialidad" class="contenedor oculto">
<h2>Elige especialidad</h2>
<button onclick="elegir('web')">🌐 Web</button>
<button onclick="elegir('ciber')">🛡 Ciberseguridad</button>
<button onclick="elegir('bd')">🗄 Base de Datos</button>
</div>

<!-- JUEGO -->
<div id="juego" class="contenedor oculto">

<p id="info"></p>

<div id="vidaBar">
<div id="vida"></div>
</div>

<h2 id="pregunta"></h2>
<div id="opciones"></div>

<button onclick="anterior()">⬅ Anterior</button>
<button onclick="reiniciar()">🔄 Reiniciar</button>

</div>

<!-- FINAL -->
<div id="pantallaFinal">
<h1 id="mensajeFinal"></h1>
<button onclick="reiniciar()">Volver a jugar</button>
</div>

<script>

// ===== ELEMENTOS =====
const loginDiv = document.getElementById("login");
const especialidadDiv = document.getElementById("especialidad");
const juegoDiv = document.getElementById("juego");
const pantallaFinalDiv = document.getElementById("pantallaFinal");

const nombreInput = document.getElementById("nombre");
const correoInput = document.getElementById("correo");

const infoTxt = document.getElementById("info");
const vidaBar = document.getElementById("vida");
const preguntaTxt = document.getElementById("pregunta");
const opcionesDiv = document.getElementById("opciones");
const mensajeFinalTxt = document.getElementById("mensajeFinal");

// ===== VARIABLES =====
let usuario=null;
let campo=null;
let vidas=100;
let xp=0;
let nivel=0;
let pIndex=0;
let preguntas=[];

// ===== LOGIN =====
function registrar(){
const nombre = nombreInput.value.trim();
const correo = correoInput.value.trim();

if(!nombre || !correo){
alert("Completa los datos");
return;
}

usuario={nombre,correo};

let db = JSON.parse(localStorage.getItem("users")) || {};

if(db[correo]){
let u = db[correo];
nivel = u.nivel || 0;
xp = u.xp || 0;
campo = u.campo || null;
}

loginDiv.classList.add("oculto");
especialidadDiv.classList.remove("oculto");
}

// ===== ESPECIALIDAD =====
function elegir(c){
campo = c;

especialidadDiv.classList.add("oculto");
juegoDiv.classList.remove("oculto");

generarPreguntas();
actualizarUI();
}

// ===== BANCO =====
const banco = {
web:[
["¿Qué etiqueta crea enlaces?",["<a>","<p>","<div>","<link>"],0],
["¿Qué cambia color texto?",["color","font","size","bg"],0],
["¿Qué es DOM?",["Estructura HTML","Servidor","BD","Nada"],0],
["¿Evento click?",["onclick","hover","css","html"],0],
["¿display:flex?",["Organiza elementos","Color","Nada","Loop"],0]
],
ciber:[
["¿Qué es phishing?",["Robo de datos","HTML","BD","Loop"],0],
["¿Firewall?",["Filtra tráfico","Diseño","Nada","Loop"],0],
["¿HTTPS?",["Conexión segura","Error","Loop","Nada"],0],
["¿Malware?",["Software malicioso","Color","Loop","Nada"],0],
["¿XSS?",["Inyección script","BD","Loop","Nada"],0]
],
bd:[
["¿SELECT?",["Consultar","Eliminar","Insertar","Nada"],0],
["¿INSERT?",["Agregar","Eliminar","Leer","Nada"],0],
["¿DELETE?",["Eliminar","Leer","Insertar","Nada"],0],
["¿Tabla?",["Datos","HTML","Loop","Nada"],0],
["¿Primary key?",["ID único","Color","Loop","Nada"],0]
]
};

// ===== GENERAR =====
function generarPreguntas(){
preguntas=[];
let base=banco[campo];

for(let i=0;i<10;i++){
let q=base[Math.floor(Math.random()*base.length)];
preguntas.push({p:q[0],o:[...q[1]],c:q[2]});
}
pIndex=0;
}

// ===== MEZCLAR =====
function mezclar(p){
let arr=p.o.map((t,i)=>({t,ok:i===p.c}));
for(let i=arr.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[arr[i],arr[j]]=[arr[j],arr[i]];
}
return arr;
}

// ===== UI =====
function actualizarUI(){
infoTxt.innerText=`Nivel ${nivel+1} | XP ${xp} | ${campo}`;

vidaBar.style.width=vidas+"%";

if(vidas<30) vidaBar.style.background="red";
else if(vidas<60) vidaBar.style.background="orange";
else vidaBar.style.background="lime";

let p=preguntas[pIndex];
preguntaTxt.innerText=p.p;

opcionesDiv.innerHTML="";
mezclar(p).forEach(o=>{
let b=document.createElement("button");
b.innerText=o.t;
b.onclick=()=>responder(o.ok);
opcionesDiv.appendChild(b);
});
}

// ===== RESPUESTA =====
function responder(ok){
if(ok){
xp+=10;
pIndex++;

if(pIndex>=preguntas.length){
nivel++;

if(nivel>=10){
mostrarFinal("🏆 GANASTE TODO");
return;
}

generarPreguntas();
}
}else{
vidas-=20;

if(vidas<=0){
mostrarFinal("💀 GAME OVER");
return;
}
}

guardar();
actualizarUI();
}

// ===== ATRAS =====
function anterior(){
if(pIndex>0){
pIndex--;
actualizarUI();
}
}

// ===== GUARDAR =====
function guardar(){
let db = JSON.parse(localStorage.getItem("users")) || {};
db[usuario.correo] = {nivel,xp,campo};
localStorage.setItem("users",JSON.stringify(db));
}

// ===== FINAL =====
function mostrarFinal(msg){
mensajeFinalTxt.innerText = msg;
pantallaFinalDiv.style.display="flex";
juegoDiv.classList.add("oculto");
}

// ===== REINICIAR =====
function reiniciar(){
vidas=100;
xp=0;
nivel=0;
pIndex=0;

pantallaFinalDiv.style.display="none";
juegoDiv.classList.remove("oculto");

generarPreguntas();
actualizarUI();
}

</script>

</body>
</html>
